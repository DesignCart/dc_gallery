PLG_CONTENT_DC_GALLERY_DOCUMENTATION_TITLE="DC Gallery - shortcode"
PLG_CONTENT_DC_GALLERY_DOCUMENTATION="<p>The <code>source</code> or <code>sourc</code> path is relative to the folder set in <strong>Base gallery folder</strong>.</p><h4>Modes (<code>mode</code>)</h4><ul><li><code>normal</code> - fixed aspect-ratio grid + GLightbox</li><li><code>tiles</code> - Macy masonry + GLightbox</li><li><code>slideshow</code> - Swiper, one slide</li><li><code>carousel</code> - Swiper, multiple slides + GLightbox</li><li><code>coverflow</code> - Swiper coverflow + GLightbox</li><li><code>cards</code> - Swiper cards + GLightbox</li><li><code>thumbs</code> - main slide + 1:1 thumb strip + GLightbox</li></ul><h4>Examples</h4><p><code>{dcgallery source=&quot;portfolio&quot; mode=&quot;normal&quot; columns=&quot;3&quot; ratio=&quot;1:3&quot;}</code><br><code>{dcgallery source=&quot;portfolio&quot; mode=&quot;tiles&quot; columns=&quot;4&quot;}</code><br><code>{dcgallery source=&quot;portfolio&quot; mode=&quot;carousel&quot; slides_visible=&quot;4&quot; slide_ratio=&quot;16:9&quot;}</code></p>"

