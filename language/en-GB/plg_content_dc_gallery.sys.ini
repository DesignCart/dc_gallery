PLG_CONTENT_DC_GALLERY_XML_DESCRIPTION="<p>Content plugin <strong>DC Gallery</strong> (Design Cart) - image galleries with GLightbox, Macy.js, and Swiper. Defaults are available in the Options tab.</p>"

PLG_CONTENT_DC_GALLERY_TAB_OPTIONS="Options"
