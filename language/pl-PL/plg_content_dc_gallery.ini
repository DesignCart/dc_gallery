PLG_CONTENT_DC_GALLERY_DOCUMENTATION="<p>Sciezka <code>source</code> lub <code>sourc</code> jest wzgledem folderu z pola <strong>Folder bazowy galerii</strong>.</p><h4>Tryby (<code>mode</code>)</h4><ul><li><code>normal</code> - siatka o stalym ratio + GLightbox</li><li><code>tiles</code> - masonry Macy + GLightbox</li><li><code>slideshow</code> - Swiper, jeden slajd</li><li><code>carousel</code> - Swiper, wiele slajdow + GLightbox</li><li><code>coverflow</code> - Swiper coverflow + GLightbox</li><li><code>cards</code> - Swiper cards + GLightbox</li><li><code>thumbs</code> - glowny slajd + miniatury 1:1 + GLightbox</li></ul><h4>Przyklady</h4><p><code>{dcgallery source=&quot;portfolio&quot; mode=&quot;normal&quot; columns=&quot;3&quot; ratio=&quot;1:3&quot;}</code><br><code>{dcgallery source=&quot;portfolio&quot; mode=&quot;tiles&quot; columns=&quot;4&quot;}</code><br><code>{dcgallery source=&quot;portfolio&quot; mode=&quot;carousel&quot; slides_visible=&quot;4&quot; slide_ratio=&quot;16:9&quot;}</code></p>"

